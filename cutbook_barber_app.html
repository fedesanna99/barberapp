  useEffect(()=>{const t=setTimeout(onClose,5000);return()=>clearTimeout(t);},[]);
  return React.createElement("div",{style:{position:"absolute",top:10,left:10,right:10,background:C.green,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,zIndex:200,animation:"toastIn .35s cubic-bezier(.34,1.56,.64,1)"}},
    React.createElement("i",{className:"ti ti-calendar-check",style:{fontSize:20,color:"#fff",flexShrink:0}}),
    React.createElement("div",{style:{flex:1}},
      React.createElement("div",{style:{fontSize:13,fontWeight:500,color:"#fff"}},"Appointment confirmed!"),
      React.createElement("div",{style:{fontSize:11,color:"rgba(255,255,255,.85)",marginTop:1}},msg)
    ),

      React.createElement("i",{className:"ti ti-x",style:{fontSize:16,color:"rgba(255,255,255,.7)"}})
    )

}
